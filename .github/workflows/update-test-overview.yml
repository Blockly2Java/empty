name: Update Test Overview

on:
  push:

permissions:
  contents: write

jobs:
  update-overview:
    name: Update README test overview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Rewrite submodule URLs to HTTPS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global --add url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf git@github.com:
          git config --global --add url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf ssh://git@github.com/

      - name: Initialize required submodules
        run: |
          git submodule sync -- solution template tests
          git -c protocol.version=2 submodule update --init --force --depth=1 solution template tests

      - name: Fetch aux sources
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -d aux/.git ]; then
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/Blockly2Java/Smiley_aux.git" aux
          fi

      - name: Stage aux classes for template build
        run: |
          mkdir -p template/src
          find aux -maxdepth 1 -name '*.java' -exec cp -f {} template/src/ \;

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run solution tests for overview
        continue-on-error: true
        run: mvn -B -f tests/pom_solution.xml -Dbuildhelper.addsource.skip=true clean test

      - name: Save solution reports
        if: always()
        run: |
          mkdir -p .ci-reports/solution
          if [ -d tests/target/surefire-reports ]; then
            cp -r tests/target/surefire-reports/. .ci-reports/solution/
          fi

      - name: Run template tests for overview
        continue-on-error: true
        run: mvn -B -f tests/pom_template.xml -Dmaven.test.failure.ignore=true clean test

      - name: Save template reports
        if: always()
        run: |
          mkdir -p .ci-reports/template
          if [ -d tests/target/surefire-reports ]; then
            cp -r tests/target/surefire-reports/. .ci-reports/template/
          fi

      - name: Update README overview section
        if: always()
        run: |
          python3 .github/scripts/update_readme_test_overview.py \
            README.md \
            .ci-reports/solution \
            .ci-reports/template

      - name: Commit updated README
        if: always()
        run: |
          if git diff --quiet -- README.md; then
            echo "README overview is unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(ci): update test overview [skip ci]"
          git push