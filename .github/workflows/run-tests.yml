name: Run Exercise Tests

on:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: solution
            pom_file: pom_solution.xml
            maven_args: -Dbuildhelper.addsource.skip=true -Dmaven.test.failure.ignore=true
          - target: template
            pom_file: pom_template.xml
            maven_args: ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Rewrite submodule URLs to HTTPS
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global --add url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf git@github.com:
          git config --global --add url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf ssh://git@github.com/

      - name: Initialize required submodules
        run: |
          git submodule sync -- solution template tests
          git -c protocol.version=2 submodule update --init --force --depth=1 solution template tests

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests for ${{ matrix.target }}
        run: mvn -B -f tests/${{ matrix.pom_file }} ${{ matrix.maven_args }} clean test

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ matrix.target }}
          path: tests/target/surefire-reports
          if-no-files-found: ignore
